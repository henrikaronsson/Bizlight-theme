<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bizlight theme | Contact</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script type="module" src="/js/main.js"></script>
  </head>

  <body>

    <site-loader></site-loader>

    <site-header current="contact"></site-header>

    <main>

      <div class="title-bar">
        <div class="container">
          <h1>Contact</h1>
        </div>
      </div>

      <div class="container my-4">
        <div class="row">
          <div class="col-md-8">
            <div class="card mb-3">
              <div class="card-header">
                <h2 class="card-title h4 mb-0">Get in touch</h2>
              </div>
              <div class="card-body">
                <form>
                  <div class="mb-3">
                    <label class="form-label" for="contact-name">Name</label>
                    <input type="text" id="contact-name" name="name" class="form-control" placeholder="Enter Name" autocomplete="name" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label" for="contact-email">Email</label>
                    <input type="email" id="contact-email" name="email" class="form-control" placeholder="Enter Email" autocomplete="email" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label" for="contact-message">Message</label>
                    <textarea id="contact-message" name="message" class="form-control" rows="4" placeholder="Enter Message" required></textarea>
                  </div>
                  <button type="submit" class="btn btn-secondary">Submit</button>
                </form>
              </div>
            </div>
          </div>
          <aside class="col-md-4">
            <div class="list-group">
              <a href="#" class="list-group-item list-group-item-action active" aria-current="true">Cras justo odio</a>
              <a href="#" class="list-group-item list-group-item-action">Dapibus ac facilisis in</a>
              <a href="#" class="list-group-item list-group-item-action">Morbi leo risus</a>
              <a href="#" class="list-group-item list-group-item-action">Porta ac consectetur ac</a>
              <a href="#" class="list-group-item list-group-item-action">Vestibulum at eros</a>
            </div>
          </aside>
        </div>
      </div>

      <newsletter-signup></newsletter-signup>

    </main>

    <site-footer></site-footer>

  </body>
</html>
